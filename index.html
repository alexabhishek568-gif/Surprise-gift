<!DOCTYPE html>
<html>
<head>
<title>For Shristi ❤️</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
text-align:center;
overflow:hidden;
}

h1{
font-size:50px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px white;}
to{ text-shadow:0 0 30px pink;}
}

p{
font-size:22px;
width:80%;
max-width:600px;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
margin:15px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:white;
color:#ff4b6e;
}

#yes:hover{
transform:scale(1.2);
}

#no{
background:#ff4b6e;
color:white;
position:absolute;
}

.heart{
position:absolute;
color:red;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>

<script>

function hearts(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},5000);
}

setInterval(hearts,300);

function yes(){
document.body.innerHTML="<h1>❤️ Yay Shristi ❤️</h1><p>You just made me the happiest person in the world!</p>";
}

function move(){
const btn=document.getElementById("no");
btn.style.top=Math.random()*80+"%";
btn.style.left=Math.random()*80+"%";
}

</script>

</head>

<body>

<h1>Hi Shristi 🌸</h1>

<p>
From the moment I met you, life became more beautiful.  
Your smile makes my day brighter.
</p>

<h2>Shristi, will you go out with me? 💖</h2>

<button id="yes" onclick="yes()">Yes ❤️</button>
<button id="no" onmouseover="move()">No 😜</button>

</body>
</html>
