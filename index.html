<!DOCTYPE html>
<html>
<head>
<title>For Shristi ❤️</title>

<style>
body{
background: linear-gradient(135deg,#ff758c,#ff7eb3);
font-family: Arial;
text-align:center;
color:white;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
}

h1{
font-size:45px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
}

#yes{
background:white;
color:#ff4b6e;
}

#no{
background:#ff4b6e;
color:white;
position:absolute;
}

.heart{
position:fixed;
top:-20px;
font-size:24px;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px);}
100%{transform:translateY(110vh);}
}
</style>

<script>
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);
}

setInterval(createHeart,400);

function yesClick(){
document.body.innerHTML="<h1>❤️ Yay Shristi! ❤️</h1><p>You made me really happy!</p>";
}

function moveNo(){
const btn=document.getElementById("no");
btn.style.top=Math.random()*80+"%";
btn.style.left=Math.random()*80+"%";
}
</script>

</head>

<body>

<h1>Hi Shristi 🌸</h1>
<p>I made this little surprise for you.</p>

<h2>Shristi, will you go out with me? 💖</h2>

<button id="yes" onclick="yesClick()">Yes ❤️</button>
<button id="no" onmouseover="moveNo()">No 😜</button>

</body>
</html>
